# coturn configuration for a self-hosted RoboTunnel stack.
#
# Install:  apt install coturn   (Ubuntu/Debian)
# Enable:   systemctl enable --now coturn
# Validate: turnutils_uclient -u test -w <TURN_SECRET> <IP>

# ── Network ────────────────────────────────────────────────────────────────────

# Public IP of the TURN server. Replace with your VPS IP or use:
#   external-ip=$(curl -s https://api.ipify.org)
external-ip=YOUR_VPS_PUBLIC_IP

listening-port=3478
tls-listening-port=5349

# ── HMAC-SHA1 time-limited credentials ────────────────────────────────────────
# tunnel-svc generates credentials via:
#   user  = unix_epoch + ttl_secs  (e.g. "1750000000:3600")
#   pass  = base64(HMAC-SHA1(TURN_SECRET, user))
use-auth-secret
static-auth-secret=REPLACE_WITH_TURN_SECRET_FROM_DOT_ENV

# Credential TTL (seconds). Must match tunnel-svc TURN_CREDENTIAL_TTL_SECS.
auth-secret-timestamp-future-skew=300

# ── TLS ───────────────────────────────────────────────────────────────────────
# Point at your certificates (Caddy / certbot renews them).
cert=/etc/ssl/certs/turn.robotunnel.io.pem
pkey=/etc/ssl/private/turn.robotunnel.io.key

# ── Relay ports ───────────────────────────────────────────────────────────────
# Open these in your firewall / security group (UDP + TCP).
min-port=49152
max-port=65535

# ── Security ──────────────────────────────────────────────────────────────────
# Only allow TURN relay (not plain STUN-only allocation that bypasses auth).
no-stun
# Deny relay to LAN addresses (prevents SSRF).
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=172.16.0.0-172.31.255.255

# ── Logging ───────────────────────────────────────────────────────────────────
log-file=/var/log/coturn/turnserver.log
simple-log
no-stdout-log
